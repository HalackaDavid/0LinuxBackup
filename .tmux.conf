## panes
#set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'
#
## statusbar
#set -g status-position bottom
#set -g status-justify left
set -g status-style 'fg=red'
#
#set -g status-left ''
#set -g status-left-length 10
#
set -g status-right-style 'fg=black bg=red'
setw -g window-status-current-style 'fg=black bg=red'
#setw -g window-status-current-format ' #I #W #F '
#
#setw -g window-status-style 'fg=red bg=black'
#setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '
#
#setw -g window-status-bell-style 'fg=yellow bg=red bold'
#
## messages
set -g message-style 'fg=yellow bg=red bold'


set -g mouse off
set -g default-command $SHELL
set-option -g base-index 1
set-option -g allow-rename off

# new windows inherit current pane's path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf

#bind -n M-Left select-pane -L
#bind -n M-Right select-pane -R
#bind -n M-Up select-pane -U
#bind -n M-Down select-pane -D

#unbind C-b
#set-option -g prefix C-a 
#bind-key C-a send-prefix
#ALT A bind 

bind x kill-pane
bind v new

bind r source-file ~/.tmux.conf

bind k if-shell '[ "#{session_name}" != "D" ]' \
    'run-shell "tmux switch-client -p && tmux kill-session -t #{session_name}"' \
    'display-message "Cannot kill session D"'
